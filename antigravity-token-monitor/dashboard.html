<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Monitor Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

        :root {
            --primary: #00ffc8;
            --primary-glow: rgba(0, 255, 200, 0.15);
            --secondary: #7c3aed;
            --secondary-glow: rgba(124, 58, 237, 0.15);
            --accent: #00a8ff;
            --dark-bg: #05060f;
            --card-border: rgba(255, 255, 255, 0.06);
            --card-bg: rgba(255, 255, 255, 0.02);
            --text-color: var(--vscode-editor-foreground, #cccccc);
            --header-color: var(--vscode-sideBarTitle-foreground, #ffffff);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Orbitron', -apple-system, sans-serif;
            background-color: var(--vscode-sideBar-background, var(--dark-bg));
            color: var(--text-color);
            padding: 16px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Scanline Overlay */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 200, 0.003) 2px,
                rgba(0, 255, 200, 0.003) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        .header {
            margin-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            position: relative;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary);
            border: 1px solid rgba(0, 255, 200, 0.2);
            background: rgba(0, 255, 200, 0.05);
            padding: 4px 10px;
            border-radius: 100px;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            animation: pulse 2s infinite ease-in-out;
            transition: all 0.3s ease;
        }

        .status-badge.processing {
            color: #ff9f43;
            border-color: rgba(255, 159, 67, 0.3);
            background: rgba(255, 159, 67, 0.05);
        }

        .status-badge.processing::before {
            background-color: #ff9f43;
            box-shadow: 0 0 8px #ff9f43;
            animation: pulse 0.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .title {
            font-size: 16px;
            font-weight: 900;
            color: var(--header-color);
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary) 60%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* KPI Grid */
        .kpi-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 14px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .kpi-card.main-kpi {
            border-left: 3px solid var(--primary);
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        .kpi-card.cost-kpi {
            border-left: 3px solid var(--secondary);
            box-shadow: 0 4px 20px var(--secondary-glow);
        }

        .kpi-card.timer-kpi {
            border-left: 3px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0, 168, 255, 0.15);
        }

        .kpi-title {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 6px;
        }

        .kpi-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
        }

        .main-kpi .kpi-value {
            text-shadow: 0 0 10px var(--primary);
        }

        .cost-kpi .kpi-value {
            text-shadow: 0 0 10px var(--secondary);
        }

        .timer-kpi .kpi-value {
            text-shadow: 0 0 10px var(--accent);
        }

        .kpi-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
        }

        /* Action Buttons */
        .actions {
            margin-bottom: 16px;
        }

        .btn {
            background: var(--vscode-button-background, var(--secondary));
            color: var(--vscode-button-foreground, #ffffff);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            width: 100%;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Timeline History Header */
        .breakdown-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--header-color);
            margin: 10px 0 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Timeline History */
        .history-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            min-height: 0;
        }

        /* Custom scrollbar */
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.01);
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 200, 0.2);
            border-radius: 10px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            margin-bottom: 8px;
            flex-shrink: 0; /* Prevent items from squishing in the flex container */
            
            /* Pure CSS Slide Down Animation on mount */
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }

        @keyframes slideDown {
            from {
                max-height: 0;
                opacity: 0;
                padding-top: 0;
                padding-bottom: 0;
                margin-bottom: 0;
                border-color: transparent;
            }
            to {
                max-height: 150px;
                opacity: 1;
                padding-top: 10px;
                padding-bottom: 10px;
                margin-bottom: 8px;
                border-color: var(--card-border);
            }
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
        }

        .item-model {
            color: var(--accent);
            font-size: 10px;
        }

        .item-details {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
        }

        .item-total {
            color: #ffffff;
            font-weight: 600;
        }

        .item-cost {
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="status-badge" id="status-badge">Monitoring</div>
        <h1 class="title">Token Monitor</h1>
    </div>

    <!-- MAIN KPIS -->
    <div class="kpi-container">
        <div class="kpi-card main-kpi">
            <div class="kpi-title">Session Burn</div>
            <div class="kpi-value" id="val-total-tokens" data-raw-value="0">0</div>
            <div class="kpi-desc">Total accumulated tokens</div>
        </div>
        <div class="kpi-card cost-kpi">
            <div class="kpi-title">Session Cost</div>
            <div class="kpi-value" id="val-total-cost" data-raw-value="0">0 ₫</div>
            <div class="kpi-desc">Estimated VND pricing</div>
        </div>
        <div class="kpi-card timer-kpi">
            <div class="kpi-title">Session Time</div>
            <div class="kpi-value" id="val-elapsed-time">00:00.000</div>
            <div class="kpi-desc">Elapsed time since last reset</div>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="actions">
        <button class="btn btn-secondary" id="btn-reset">Reset Session Stats</button>
    </div>

    <!-- TIMELINE HISTORY -->
    <div class="history-container">
        <div class="breakdown-title">
            <span>Conversation Steps</span>
        </div>
        <div class="history-list" id="history-list">
            <div class="placeholder-msg" style="text-align: center; color: rgba(255, 255, 255, 0.2); padding: 20px 0;">No active chat session.</div>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        const valTotalTokens = document.getElementById('val-total-tokens');
        const valTotalCost = document.getElementById('val-total-cost');
        const historyList = document.getElementById('history-list');

        let resetTimestamp = Date.now();
        let lastResetTimestamp = 0;
        let isProcessing = false;
        let elapsedBeforePause = 0;
        let lastStartTime = Date.now();
        let animationFrameId = null;

        // Stopwatch function
        function updateStopwatch() {
            const timerValEl = document.getElementById('val-elapsed-time');
            if (!timerValEl) return;

            let elapsedMs = elapsedBeforePause;
            if (isProcessing) {
                elapsedMs += (Date.now() - lastStartTime);
            }

            const totalSeconds = Math.floor(elapsedMs / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const ms = elapsedMs % 1000;

            const formattedMin = minutes.toString().padStart(2, '0');
            const formattedSec = seconds.toString().padStart(2, '0');
            const formattedMs = ms.toString().padStart(3, '0');

            timerValEl.innerText = `${formattedMin}:${formattedSec}.${formattedMs}`;
            
            if (isProcessing) {
                animationFrameId = requestAnimationFrame(updateStopwatch);
            }
        }

        function setProcessingState(newProcessing) {
            if (isProcessing === newProcessing) return;

            if (newProcessing) {
                // Resume
                lastStartTime = Date.now();
                isProcessing = true;
                if (!animationFrameId) {
                    animationFrameId = requestAnimationFrame(updateStopwatch);
                }
            } else {
                // Pause
                elapsedBeforePause += (Date.now() - lastStartTime);
                isProcessing = false;
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                updateStopwatch();
            }

            // Update status badge UI
            const badge = document.getElementById('status-badge');
            if (badge) {
                if (isProcessing) {
                    badge.innerText = 'Processing';
                    badge.className = 'status-badge processing';
                } else {
                    badge.innerText = 'Idle';
                    badge.className = 'status-badge';
                }
            }
        }

        // Start Stopwatch Immediately (initially idle)
        updateStopwatch();

        // Reset Button
        document.getElementById('btn-reset').addEventListener('click', () => {
            vscode.postMessage({ command: 'reset' });
        });

        // Listen for messages from extension backend
        window.addEventListener('message', event => {
            const message = event.data;
            if (message.command === 'update') {
                const stats = message.stats;
                if (stats.resetTimestamp) {
                    resetTimestamp = stats.resetTimestamp;
                    if (resetTimestamp !== lastResetTimestamp) {
                        lastResetTimestamp = resetTimestamp;
                        elapsedBeforePause = 0;
                        lastStartTime = Date.now();
                    }
                }
                setProcessingState(stats.isProcessing || false);
                updateStatsView(stats);
            }
        });

        // Smooth Rolling Number Animation
        function animateNumber(element, targetValue, isCurrency = false, formatFn = null) {
            const startValue = parseFloat(element.getAttribute('data-raw-value') || '0');
            if (startValue === targetValue) {
                if (isCurrency) {
                    element.innerText = Math.round(targetValue).toLocaleString() + ' ₫';
                } else if (formatFn) {
                    element.innerText = formatFn(targetValue);
                } else {
                    element.innerText = Math.round(targetValue).toLocaleString();
                }
                return;
            }

            element.setAttribute('data-raw-value', targetValue);
            const duration = 800; // 0.8 seconds
            const startTime = performance.now();

            function update(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const currentValue = startValue + (targetValue - startValue) * ease;

                if (isCurrency) {
                    element.innerText = Math.round(currentValue).toLocaleString() + ' ₫';
                } else if (formatFn) {
                    element.innerText = formatFn(currentValue);
                } else {
                    element.innerText = Math.round(currentValue).toLocaleString();
                }

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        function updateStatsView(stats) {
            animateNumber(valTotalTokens, stats.totalTokens, false, val => Math.round(val).toLocaleString());
            animateNumber(valTotalCost, stats.totalCost, true);

            // Update steps list without destroying list when not needed
            if (stats.steps && stats.steps.length > 0) {
                const domItems = historyList.querySelectorAll('.history-item');
                let needsPurge = false;
                
                if (domItems.length > stats.steps.length) {
                    needsPurge = true;
                } else {
                    const stepIdxs = new Set(stats.steps.map(s => s.idx.toString()));
                    for (let domEl of domItems) {
                        if (!stepIdxs.has(domEl.getAttribute('data-idx'))) {
                            needsPurge = true;
                            break;
                        }
                    }
                }

                if (needsPurge || historyList.querySelector('.placeholder-msg')) {
                    historyList.innerHTML = '';
                }

                // Render only new items (prepending them to the top of list)
                stats.steps.forEach(step => {
                    const existing = historyList.querySelector(`.history-item[data-idx="${step.idx}"]`);
                    if (!existing) {
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.setAttribute('data-idx', step.idx);
                        item.innerHTML = `
                            <div class="item-header">
                                <span>Step #${step.idx}</span>
                                <span class="item-cost">${Math.round(step.cost).toLocaleString()} ₫</span>
                            </div>
                            <div class="item-model">${step.model}</div>
                            <div class="item-details">
                                <span>In/Cache/Out:</span>
                                <span class="item-total">${formatNumber(step.input)} / ${formatNumber(step.cached)} / ${formatNumber(step.output)}</span>
                            </div>
                        `;
                        // Prepend
                        if (historyList.firstChild) {
                            historyList.insertBefore(item, historyList.firstChild);
                        } else {
                            historyList.appendChild(item);
                        }
                    }
                });
            } else {
                historyList.innerHTML = '<div class="placeholder-msg" style="text-align: center; color: rgba(255, 255, 255, 0.2); padding: 20px 0;">No active chat session.</div>';
            }
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return Math.round(num).toString();
        }
    </script>
</body>
</html>
