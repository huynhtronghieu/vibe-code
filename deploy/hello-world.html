<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Animated background grid */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(100, 60, 255, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 60, 255, 0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7c3aed, transparent 70%);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #2563eb, transparent 70%);
      bottom: -80px; right: -80px;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #db2777, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -6s;
    }

    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.1); }
    }

    /* Main container */
    .container {
      position: relative;
      text-align: center;
      z-index: 10;
    }

    /* Glowing card */
    .card {
      position: relative;
      padding: 60px 80px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 40px 80px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* Animated border gradient */
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, #7c3aed, #2563eb, #db2777, #7c3aed);
      background-size: 300% 300%;
      animation: borderRotate 4s linear infinite;
      z-index: -1;
      opacity: 0.6;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: rgba(10, 10, 15, 0.95);
      z-index: -1;
    }

    @keyframes borderRotate {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Greeting label */
    .label {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(200, 160, 255, 0.7);
      margin-bottom: 20px;
      padding: 6px 16px;
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 100px;
      background: rgba(124, 58, 237, 0.1);
    }

    /* Main text */
    .hello {
      font-size: clamp(56px, 10vw, 100px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .world {
      font-size: clamp(56px, 10vw, 100px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #f472b6 0%, #a78bfa 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.3); }
    }

    /* Subtitle */
    .subtitle {
      margin-top: 24px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 1px;
    }

    /* Divider */
    .divider {
      margin: 32px auto;
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.6), transparent);
    }

    /* Particle dots */
    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 28px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7c3aed;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; background: #2563eb; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #db2777; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.6); opacity: 1; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(167, 139, 250, 0.6);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Click ripple */
    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 2px solid rgba(167, 139, 250, 0.6);
      transform: scale(0);
      pointer-events: none;
      z-index: 20;
    }

    .ripple.active {
      animation: rippleOut 0.8s ease-out forwards;
    }

    @keyframes rippleOut {
      to { transform: scale(6); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="grid"></div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="card">
      <div class="label">Welcome to the universe</div>
      <div class="hello" id="hello">Hello,</div>
      <div class="world" id="world">World.</div>
      <div class="divider"></div>
      <div class="subtitle">Click anywhere to feel the magic ✦</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <script>
    // --- Floating particles ---
    const particlesEl = document.getElementById('particles');
    const PARTICLE_COUNT = 40;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
      p.style.animationDuration = (Math.random() * 12 + 8) + 's';
      p.style.animationDelay  = (Math.random() * 12) + 's';
      const hue = [270, 220, 330][Math.floor(Math.random() * 3)];
      p.style.background = `hsla(${hue}, 80%, 70%, 0.7)`;
      particlesEl.appendChild(p);
    }

    // --- Click ripple effect ---
    document.addEventListener('click', (e) => {
      const ripple = document.createElement('div');
      const size = 60;
      ripple.className = 'ripple';
      ripple.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${e.clientY - size / 2}px;
        left: ${e.clientX - size / 2}px;
      `;
      document.body.appendChild(ripple);
      requestAnimationFrame(() => ripple.classList.add('active'));
      ripple.addEventListener('animationend', () => ripple.remove());

      // Spawn burst particles
      for (let i = 0; i < 8; i++) {
        const burst = document.createElement('div');
        burst.style.cssText = `
          position: fixed;
          width: 4px; height: 4px;
          border-radius: 50%;
          background: hsl(${Math.random() * 60 + 250}, 90%, 70%);
          left: ${e.clientX}px;
          top: ${e.clientY}px;
          pointer-events: none;
          z-index: 999;
          transition: transform 0.8s ease-out, opacity 0.8s ease-out;
        `;
        document.body.appendChild(burst);
        const angle = (i / 8) * Math.PI * 2;
        const dist  = 60 + Math.random() * 60;
        requestAnimationFrame(() => {
          burst.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) scale(0)`;
          burst.style.opacity = '0';
        });
        setTimeout(() => burst.remove(), 800);
      }
    });

    // --- Typing easter egg on hover ---
    const helloEl = document.getElementById('hello');
    const messages = ['Hello,', 'Xin chào,', 'こんにちは,', 'Bonjour,', 'Hola,', '안녕하세요,'];
    let msgIndex = 0;
    let typing = false;

    helloEl.addEventListener('mouseenter', () => {
      if (typing) return;
      typing = true;
      msgIndex = (msgIndex + 1) % messages.length;
      const target = messages[msgIndex];
      let i = 0;
      helloEl.textContent = '';
      const iv = setInterval(() => {
        helloEl.textContent = target.slice(0, ++i);
        if (i >= target.length) { clearInterval(iv); typing = false; }
      }, 60);
    });

    // --- Subtle parallax on mouse move ---
    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      document.querySelector('.card').style.transform =
        `perspective(800px) rotateY(${dx * 6}deg) rotateX(${-dy * 6}deg)`;
    });

    document.addEventListener('mouseleave', () => {
      document.querySelector('.card').style.transform = '';
    });
  </script>
</body>
</html>
